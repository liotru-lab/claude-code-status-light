name: CCStatusLight

options:
  bundleIdPrefix: com.liotru-lab
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"

targets:
  CCStatusLight:
    type: application
    platform: macOS
    sources:
      - Sources/CCStatusLight
      # Bundle the hook scripts into Contents/Resources/hooks so the app can
      # install them itself (see AppDelegate "Install Hooks…").
      - path: hooks
        type: folder
        buildPhase: resources
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    info:
      path: Sources/CCStatusLight/Info.plist
      properties:
        CFBundleName: CCStatusLight
        CFBundleDisplayName: CC Status Light
        # Wire the bundle version to the build settings so releases report the
        # real version (otherwise XcodeGen hardcodes 1.0 / 1).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "15.0"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2026 liotru-lab. MIT License."
    settings:
      base:
        PRODUCT_NAME: CCStatusLight
        PRODUCT_BUNDLE_IDENTIFIER: com.liotru-lab.claude-code-status-light
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Signing is configured in Signing.xcconfig (ad-hoc by default; override
        # the team via a git-ignored Local.xcconfig). Release uses Developer ID.
        ENABLE_HARDENED_RUNTIME: "NO"
        COMBINE_HIDPI_IMAGES: "YES"
